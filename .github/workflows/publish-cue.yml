name: Publish CUE Modules

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to publish'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - modules/opm
          - modules/opm_platform
      dry_run:
        description: 'Validate only, skip publish'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  CUE_VERSION: 'v0.16.0'
  CUE_REGISTRY: 'opmodel.dev=ghcr.io/open-platform-model,registry.cue.works'

jobs:
  publish:
    name: Validate and Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install yq
        uses: mikefarah/yq@751d8ad57b84f1794661bc70c0afb92a22ad7b3c # v4.53.2
        with:
          cmd: echo "yq installed"

      # Module set: relative path (key in cue-versions.yml) : OCI repository.
      # testdata/modules/* are test fixtures — verified by cue.yml, never
      # published. The core schema (apis/core) is no longer published here —
      # it lives in its own repo (github.com/open-platform-model/core) with
      # its own release lifecycle.
      - name: Check registry for unpublished versions
        id: check
        run: |
          set -euo pipefail

          # workflow_dispatch bypasses the registry check — user controls via inputs.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version_published() {
            local repo="$1" tag="$2"
            curl -fsS --head \
              -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json,*/*" \
              "https://ghcr.io/v2/open-platform-model/${repo}/manifests/${tag}" \
              >/dev/null 2>&1
          }

          MODULES="modules/opm:opmodel.dev/modules/opm modules/opm_platform:opmodel.dev/modules/opm_platform"
          CHANGED=""

          for entry in $MODULES; do
            path="${entry%%:*}"
            oci_repo="${entry##*:}"
            version=$(yq ".\"${path}\".version" cue-versions.yml)

            if version_published "$oci_repo" "$version"; then
              echo "  ${path}@${version}: already published"
            else
              echo "  ${path}@${version}: unpublished"
              CHANGED="${CHANGED} ${path}"
            fi
          done

          if [ -z "$CHANGED" ]; then
            echo ""
            echo "All modules at current versions already published. Nothing to do."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo ""
            echo "Modules to process:${CHANGED}"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"
          fi

      - uses: cue-lang/setup-cue@a93fa358375740cd8b0078f76355512b9208acb1 # v1.0.1
        if: steps.check.outputs.has_changes == 'true'
        with:
          version: ${{ env.CUE_VERSION }}

      - name: Login to GHCR
        if: steps.check.outputs.has_changes == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Validate and publish modules
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          MODULE="${{ inputs.module || 'all' }}"
          DRY_RUN="${{ inputs.dry_run || 'false' }}"
          CHANGED="${{ steps.check.outputs.changed }}"

          should_process() {
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              [ "$MODULE" = "all" ] || [ "$MODULE" = "$1" ]
            else
              echo " $CHANGED " | grep -q " $1 "
            fi
          }

          fmt_check() {
            local dir="$1"
            (cd "$dir" && cue fmt ./...)
            if ! git diff --quiet -- "$dir"; then
              echo "::error::CUE files in ${dir} are not formatted. Run 'cue fmt ./...' locally."
              git diff --name-only -- "$dir"
              exit 1
            fi
          }

          publish_module() {
            local path="$1"
            local version
            version=$(yq ".\"${path}\".version" cue-versions.yml)
            echo "=== ${path}@${version} ==="
            fmt_check "$path"
            echo "  vet..."
            (cd "$path" && cue vet ./...)
            if [ "$DRY_RUN" = "true" ]; then
              echo "  publish: skipped (dry run)"
              return
            fi
            echo "  publish ${path}@${version}..."
            (cd "$path" && cue mod publish "${version}")
            echo "  published ${path}@${version}"
          }

          # Process in dependency order — each module is validated then
          # published before the next, so downstream modules resolve their
          # deps from GHCR.
          for path in modules/opm modules/opm_platform; do
            if should_process "$path"; then
              publish_module "$path"
            fi
          done

          echo ""
          echo "Done."
