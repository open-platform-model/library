name: Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  # The kernel flow + live integration tests resolve the OPM core schema and
  # the opmodel.dev/catalogs/opm catalog from GHCR (see schema.PublicRegistry).
  # No local registry is needed — CI has network access to ghcr.io.
  CUE_REGISTRY: "opmodel.dev=ghcr.io/open-platform-model,registry.cue.works"

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.x

      - name: Running Tests
        env:
          # Turn the registry-skip into a hard failure: ghcr.io is reachable in
          # CI, so the flow + live integration tests MUST run, not silently skip.
          OPM_FLOW_TEST_FORCE: "1"
        run: |
          go mod tidy
          task test
