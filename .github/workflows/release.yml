name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      # The library ships no binary and no container image — a release is the
      # git tag itself. release-please opens the release PR, tags vX.Y.Z on
      # merge, and creates the GitHub Release. `go get` resolves off the tag
      # with no further build steps.
      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
