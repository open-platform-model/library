name: CUE

on:
  push:
    branches: [main]
  pull_request:

env:
  # Matches schema.PublicRegistry / CUE_GHCR_REGISTRY in Taskfile.yml. The OPM
  # core schema and the opmodel.dev/catalogs/opm catalog both resolve from GHCR
  # (their own repos); everything else from registry.cue.works. No local
  # registry: the fixtures pin a published catalog version and pull it from
  # ghcr.io, which is what lets this job — and the Go tests — run in CI.
  CUE_REGISTRY: "opmodel.dev=ghcr.io/open-platform-model,registry.cue.works"

jobs:
  cue:
    name: Validate CUE modules
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Setup CUE
        uses: cue-lang/setup-cue@a93fa358375740cd8b0078f76355512b9208acb1 # v1.0.1
        with:
          version: v0.16.0

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.x

      - name: Check fixtures track the latest catalog
        # Fails if any fixture pins an opmodel.dev/catalogs/opm version older
        # than the latest published on GHCR. Remediate with `task cue:deps:update`.
        run: task cue:catalog:drift

      - name: Check CUE formatting
        run: |
          task cue:fmt
          git diff --exit-code

      - name: Vet CUE modules
        run: task cue:vet

      - name: Run plan/match/compile flow test
        env:
          # Turn the registry-skip into a hard failure — ghcr.io is reachable
          # and the fixtures pin a published catalog, so the flow MUST run.
          OPM_FLOW_TEST_FORCE: "1"
        run: task cue:test:flow
