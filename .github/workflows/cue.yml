name: CUE

on:
  push:
    branches: [main]
  pull_request:

env:
  # Matches CUE_LOCAL_REGISTRY in Taskfile.yml. The OPM core schema lives in
  # its own repo and is pulled from GHCR; the catalog + on-disk fixtures
  # resolve from the ephemeral local registry; everything else from
  # registry.cue.works.
  CUE_REGISTRY: "opmodel.dev/core=ghcr.io/open-platform-model,opmodel.dev=localhost:5000+insecure,registry.cue.works"

jobs:
  cue:
    name: Validate CUE modules
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Setup CUE
        uses: cue-lang/setup-cue@a93fa358375740cd8b0078f76355512b9208acb1 # v1.0.1
        with:
          version: v0.16.0

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.x

      - name: Install yq
        uses: mikefarah/yq@751d8ad57b84f1794661bc70c0afb92a22ad7b3c # v4.53.2
        with:
          cmd: echo "yq installed"

      - name: Publish catalog to local registry
        # The OPM core schema is pulled from GHCR (its own repo). Only the
        # catalog is published to the ephemeral local registry: the platform
        # subscribes to it and the on-disk fixtures (opm_platform, web_app)
        # resolve their imports against it. cue:publish:catalog stamps the
        # version from cue-versions.yml and vets before publishing.
        run: |
          set -euo pipefail
          VERSION=$(yq '.["catalogs/opm"].version' cue-versions.yml)
          task cue:publish:catalog VERSION="$VERSION"

      - name: Check CUE formatting
        run: |
          task cue:fmt
          git diff --exit-code

      - name: Vet CUE modules
        run: task cue:vet

      - name: Run plan/match/compile flow test
        env:
          # Turn the registry-skip into a hard failure — the local registry
          # is up and the fixtures are published, so the flow MUST run.
          OPM_FLOW_TEST_FORCE: "1"
        run: task cue:test:flow
