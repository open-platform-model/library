version: "3"

# Silent by default — set TASK_VERBOSE=1 or use --verbose to show commands
silent: true

includes:
  enhancements:
    taskfile: ./.tasks/enhancements.yaml

vars:
  COVERAGE_FILE: coverage.out
  COVERAGE_HTML: coverage.html

  # CUE module discovery globs (relative to library root). Each glob expands
  # to directories that contain cue.mod/module.cue. Supports both bulk
  # autodiscovery (modules/*) and pinned single-module entries.
  CUE_MODULE_GLOBS: |
    modules/*
    testdata/modules/*

  CUE_VERSION_FILE: cue-versions.yml
  CUE_DEFAULT_VERSION: v1.0.0
  # The OPM core schema lives in its own repo and is published to GHCR; the
  # workspace-local registry holds only the catalogs/fixtures. The more
  # specific opmodel.dev/core prefix resolves the schema from GHCR while every
  # other opmodel.dev module (catalogs, test fixtures) resolves from localhost.
  CUE_LOCAL_REGISTRY: "opmodel.dev/core=ghcr.io/open-platform-model,opmodel.dev=localhost:5000+insecure,registry.cue.works"

  # All-GHCR mapping (mirrors schema.PublicRegistry in opm/schema/loader.go).
  # The OPM core schema and the opmodel.dev/catalogs/opm catalog both live in
  # their own repos published to GHCR; cue.dev/x/k8s.io falls through to the
  # central registry.cue.works. Used by dep-update + drift so the on-disk
  # fixtures track the published catalog (and stay CI-resolvable, no localhost).
  CUE_GHCR_REGISTRY: "opmodel.dev=ghcr.io/open-platform-model,registry.cue.works"

  # GHCR repo holding the published OPM catalog, and the fixtures whose catalog
  # pin the drift check verifies against the latest published tag.
  CATALOG_GHCR_REPO: "ghcr.io/open-platform-model/opmodel.dev/catalogs/opm"
  CATALOG_FIXTURE_MODULES: |
    testdata/modules/web_app
    modules/opm_platform

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  ## Code quality

  fmt:
    desc: Format Go code (gofmt + goimports)
    cmds:
      - go fmt ./...
      - |
        if command -v goimports >/dev/null 2>&1; then
          goimports -w .
        fi

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    preconditions:
      - sh: command -v golangci-lint
        msg: "golangci-lint is not installed: https://golangci-lint.run/usage/install/"
    cmds:
      - golangci-lint run ./...

  lint:fix:
    desc: Run golangci-lint with --fix
    preconditions:
      - sh: command -v golangci-lint
        msg: "golangci-lint is not installed: https://golangci-lint.run/usage/install/"
    cmds:
      - golangci-lint run --fix ./...

  ## Module hygiene

  tidy:
    desc: Tidy go.mod and go.sum
    cmds:
      - go mod tidy

  build:
    desc: Compile all packages (no binary; library has no main)
    cmds:
      - go build ./...

  ## Tests

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:verbose:
    desc: Run unit tests with verbose output
    cmds:
      - go test -v ./...

  test:run:
    desc: Run a specific test by name
    summary: |
      Run a specific test by name using the TEST parameter.

      Usage:
        task test:run TEST=TestResource_GVK
        task test:run TEST=TestConfigError
    vars:
      TEST: '{{.TEST | default ""}}'
    preconditions:
      - sh: '[ -n "{{.TEST}}" ]'
        msg: "TEST variable is required. Usage: task test:run TEST=TestName"
    cmds:
      - go test -v ./... -run "{{.TEST}}"

  test:coverage:
    desc: Run tests with coverage and produce HTML report
    cmds:
      - go test -coverprofile={{.COVERAGE_FILE}} ./...
      - go tool cover -html={{.COVERAGE_FILE}} -o {{.COVERAGE_HTML}}
    generates:
      - "{{.COVERAGE_FILE}}"
      - "{{.COVERAGE_HTML}}"

  ## Aggregates

  check:
    desc: Run fmt, vet, lint, and tests
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test

  check:fast:
    desc: Run fmt, vet, and tests (skip lint)
    cmds:
      - task: fmt
      - task: vet
      - task: test

  ## Cleanup

  clean:
    desc: Remove coverage artifacts
    cmds:
      - rm -f {{.COVERAGE_FILE}} {{.COVERAGE_HTML}}

  # ============================================================================
  # CUE module lifecycle
  #
  # Auto-discovers CUE modules via CUE_MODULE_GLOBS. Each match must contain
  # cue.mod/module.cue. Module identity comes from the `module:` field; per-
  # module version + checksum tracked in cue-versions.yml keyed by relative
  # path (e.g. modules/opm, modules/opm_platform).
  # ============================================================================

  cue:discover:
    desc: List all discovered CUE modules
    env:
      CUE_REGISTRY: "{{.CUE_LOCAL_REGISTRY}}"
    cmds:
      - |
        set -euo pipefail
        BOLD='\033[1m'; DIM='\033[2m'; RESET='\033[0m'
        printf "${BOLD}%-32s %-50s %s${RESET}\n" "PATH" "MODULE" "DEPS"
        while IFS= read -r glob; do
          [ -z "$glob" ] && continue
          for dir in $glob; do
            [ -f "${dir}/cue.mod/module.cue" ] || continue
            path=$(cue export "${dir}/cue.mod/module.cue" --out json | jq -r '.module')
            deps=$(cue export "${dir}/cue.mod/module.cue" --out json | jq -r '.deps // {} | keys | join(",")')
            printf "%-32s %-50s ${DIM}%s${RESET}\n" "$dir" "$path" "$deps"
          done
        done <<< '{{.CUE_MODULE_GLOBS}}'

  cue:fmt:
    desc: Format CUE files in all discovered modules
    env:
      CUE_REGISTRY: "{{.CUE_LOCAL_REGISTRY}}"
    cmds:
      - |
        set -euo pipefail
        while IFS= read -r glob; do
          [ -z "$glob" ] && continue
          for dir in $glob; do
            [ -f "${dir}/cue.mod/module.cue" ] || continue
            echo "Formatting ${dir}..."
            (cd "$dir" && cue fmt ./...)
          done
        done <<< '{{.CUE_MODULE_GLOBS}}'

  cue:vet:
    desc: Validate all discovered CUE modules
    vars:
      CONCRETE: '{{.CONCRETE | default "false"}}'
      VET_FLAGS: '{{if eq .CONCRETE "true"}}-c{{end}}'
    env:
      CUE_REGISTRY: "{{.CUE_LOCAL_REGISTRY}}"
    cmds:
      - |
        set -euo pipefail
        while IFS= read -r glob; do
          [ -z "$glob" ] && continue
          for dir in $glob; do
            [ -f "${dir}/cue.mod/module.cue" ] || continue
            echo "Validating ${dir}{{if eq .CONCRETE "true"}} (concrete){{end}}..."
            (cd "$dir" && cue vet {{.VET_FLAGS}} ./...)
          done
        done <<< '{{.CUE_MODULE_GLOBS}}'

  cue:tidy:
    desc: Tidy dependencies in all discovered CUE modules
    env:
      CUE_REGISTRY: "{{.CUE_LOCAL_REGISTRY}}"
    cmds:
      - |
        set -euo pipefail
        while IFS= read -r glob; do
          [ -z "$glob" ] && continue
          for dir in $glob; do
            [ -f "${dir}/cue.mod/module.cue" ] || continue
            echo "Tidying ${dir}..."
            (cd "$dir" && cue mod tidy)
          done
        done <<< '{{.CUE_MODULE_GLOBS}}'

  cue:deps:update:
    desc: Update CUE deps to latest across all discovered modules
    summary: |
      For each module discovered via CUE_MODULE_GLOBS, snapshots current
      dep versions, runs `cue mod get <dep>` for every direct dep (which
      resolves to the latest version in the registry), then `cue mod tidy`
      to reconcile. Prints a colored old → new diff per dep.

      Usage:
        task cue:deps:update
    env:
      # Resolve against GHCR so the catalog (and core schema) bump to their
      # latest *published* versions — the fixtures must stay CI-resolvable.
      CUE_REGISTRY: "{{.CUE_GHCR_REGISTRY}}"
    preconditions:
      - sh: command -v jq >/dev/null 2>&1
        msg: "jq is required"
      - sh: command -v cue >/dev/null 2>&1
        msg: "cue is required"
    cmds:
      - |
        #!/usr/bin/env bash
        set -euo pipefail

        BOLD='\033[1m'; DIM='\033[2m'; YELLOW='\033[1;33m'; GREEN='\033[0;32m'; CYAN='\033[1;36m'; RESET='\033[0m'

        while IFS= read -r glob; do
          [ -z "$glob" ] && continue
          for dir in $glob; do
            [ -f "${dir}/cue.mod/module.cue" ] || continue

            printf "==> ${CYAN}%s${RESET}\n" "$dir"

            mod_json=$(cue export "${dir}/cue.mod/module.cue" --out json)
            deps=$(echo "$mod_json" | jq -r '.deps // {} | keys[]')

            if [ -z "$deps" ]; then
              printf "    ${DIM}(no deps)${RESET}\n"
              continue
            fi

            declare -A OLD
            while IFS= read -r dep; do
              [ -z "$dep" ] && continue
              OLD["$dep"]=$(echo "$mod_json" | jq -r --arg d "$dep" '.deps[$d].v // ""')
            done <<< "$deps"

            (
              cd "$dir"
              while IFS= read -r dep; do
                [ -z "$dep" ] && continue
                cue mod get "$dep" >/dev/null 2>&1 || true
              done <<< "$deps"
              cue mod tidy >/dev/null 2>&1 || true
            )

            new_json=$(cue export "${dir}/cue.mod/module.cue" --out json)
            while IFS= read -r dep; do
              [ -z "$dep" ] && continue
              new_ver=$(echo "$new_json" | jq -r --arg d "$dep" '.deps[$d].v // ""')
              old_ver="${OLD[$dep]:-}"
              if [ -n "$new_ver" ] && [ "$old_ver" != "$new_ver" ]; then
                printf "    %s: ${YELLOW}%s${RESET} -> ${GREEN}%s${RESET}\n" "$dep" "$old_ver" "$new_ver"
              else
                printf "    %s: ${DIM}%s (unchanged)${RESET}\n" "$dep" "$old_ver"
              fi
            done <<< "$deps"

            unset OLD
          done
        done <<< '{{.CUE_MODULE_GLOBS}}'

        printf "${BOLD}Done.${RESET}\n"

  cue:catalog:drift:
    desc: Fail if any fixture pins an opmodel.dev/catalogs/opm version behind the latest GHCR release
    summary: |
      Queries GHCR (anonymously) for the latest published opmodel.dev/catalogs/opm
      tag, then compares it against the version each fixture pins in its
      cue.mod/module.cue. Exits non-zero if any fixture is behind, so CI catches
      a stale pin. Remediate with `task cue:deps:update`.

      Pre-release tags (vX.Y.Z-dev.*) are ignored — only stable releases count.

      Usage:
        task cue:catalog:drift
    preconditions:
      - sh: command -v jq >/dev/null 2>&1
        msg: "jq is required"
      - sh: command -v curl >/dev/null 2>&1
        msg: "curl is required"
    cmds:
      - |
        #!/usr/bin/env bash
        set -euo pipefail

        RED='\033[0;31m'; GREEN='\033[0;32m'; YELLOW='\033[1;33m'; BOLD='\033[1m'; RESET='\033[0m'

        repo="{{.CATALOG_GHCR_REPO}}"
        # ghcr.io needs a pull token even for public reads. Derive the registry
        # host and repository path from the configured repo string.
        host="${repo%%/*}"            # ghcr.io
        path="${repo#*/}"             # open-platform-model/opmodel.dev/catalogs/opm

        token=$(curl -fsSL "https://${host}/token?scope=repository:${path}:pull" | jq -r '.token')
        if [ -z "$token" ] || [ "$token" = "null" ]; then
          echo -e "${RED}Failed to obtain a GHCR pull token for ${path}${RESET}" >&2
          exit 1
        fi

        tags=$(curl -fsSL -H "Authorization: Bearer ${token}" "https://${host}/v2/${path}/tags/list" | jq -r '.tags[]?')
        if [ -z "$tags" ]; then
          echo -e "${RED}No tags found for ${repo}${RESET}" >&2
          exit 1
        fi

        # Latest stable: strip leading v, drop pre-releases (contain '-'), sort semver.
        latest=$(echo "$tags" \
          | sed 's/^v//' \
          | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
          | sort -t. -k1,1n -k2,2n -k3,3n \
          | tail -1)
        if [ -z "$latest" ]; then
          echo -e "${RED}No stable semver tags for ${repo} (got: $(echo "$tags" | tr '\n' ' '))${RESET}" >&2
          exit 1
        fi
        echo -e "${BOLD}Latest published catalog:${RESET} v${latest}"

        drift=0
        while IFS= read -r dir; do
          [ -z "$dir" ] && continue
          mod="${dir}/cue.mod/module.cue"
          [ -f "$mod" ] || { echo -e "${YELLOW}skip ${dir} (no cue.mod/module.cue)${RESET}"; continue; }

          pinned=$(cue export "$mod" --out json | jq -r '.deps["opmodel.dev/catalogs/opm@v0"].v // empty' | sed 's/^v//')
          if [ -z "$pinned" ]; then
            echo -e "    ${dir}: ${YELLOW}(does not depend on the catalog)${RESET}"
            continue
          fi

          if [ "$pinned" = "$latest" ]; then
            echo -e "    ${dir}: ${GREEN}v${pinned} (current)${RESET}"
          else
            echo -e "    ${dir}: ${RED}v${pinned} — behind latest v${latest}${RESET}"
            drift=1
          fi
        done <<< '{{.CATALOG_FIXTURE_MODULES}}'

        if [ "$drift" -ne 0 ]; then
          echo -e "${RED}${BOLD}Catalog drift detected.${RESET} Run ${BOLD}task cue:deps:update${RESET} to bump the fixtures." >&2
          exit 1
        fi
        echo -e "${GREEN}All fixtures track the latest published catalog.${RESET}"

  cue:check:
    desc: Run cue:fmt and cue:vet across all discovered modules
    cmds:
      - task: cue:fmt
      - task: cue:vet

  cue:test:flow:
    desc: Run the plan/match/compile flow integration test against the on-disk web_app + opm_platform fixtures
    summary: |
      Drives `TestFlow_WebApp_OnOpmPlatform` in opm/kernel/flow_integration_test.go.

      The test loads:
        - testdata/modules/web_app/   (consumer #Module using opm primitives)
        - modules/opm_platform/        (canonical Kubernetes #Platform)
      and runs Match → Plan → Compile end-to-end. CUE imports (the catalog and
      core schema) resolve from GHCR; the test skips with a clear message if
      ghcr.io is unreachable.

      Force-run (turn the skip into a hard failure) by setting
      OPM_FLOW_TEST_FORCE=1.

      Usage:
        task cue:test:flow                       # honour the registry-skip
        OPM_FLOW_TEST_FORCE=1 task cue:test:flow # require GHCR
    env:
      CUE_REGISTRY: "{{.CUE_GHCR_REGISTRY}}"
    cmds:
      - go test -v ./opm/kernel/... -run TestFlow_WebApp_OnOpmPlatform

  cue:test:flow:inspect:
    desc: Pretty-print every plan/match/compile stage via cmd/flow-inspect
    summary: |
      Runs `go run ./cmd/flow-inspect`, which loads the same fixtures as
      cue:test:flow and dumps each pipeline stage as readable CUE:

        Stage 1 — loaded web_app #Module
        Stage 2 — opm-platform metadata, registered Modules, computed views,
                  matcher reverse index
        Stage 3 — constructed #ModuleRelease (metadata, values, components)
        Stage 4 — MatchPlan (matched / unmatched / ambiguous / unhandled)
                  + per-pair Compiled outputs

      Filter to a subset via STAGES=<comma list>. Bypass the registry probe
      (use it when the registry is on a non-default address) by setting
      OPM_FLOW_INSPECT_FORCE=1.

      Usage:
        task cue:test:flow:inspect                            # all stages
        task cue:test:flow:inspect STAGES=plan                # one stage
        task cue:test:flow:inspect STAGES=module,release      # several
        OPM_FLOW_INSPECT_FORCE=1 task cue:test:flow:inspect   # skip probe
    vars:
      STAGES: '{{.STAGES | default ""}}'
    env:
      CUE_REGISTRY: "{{.CUE_GHCR_REGISTRY}}"
    cmds:
      - |
        if [ -n "{{.STAGES}}" ]; then
          go run ./cmd/flow-inspect -stages "{{.STAGES}}"
        else
          go run ./cmd/flow-inspect
        fi

  cue:publish:
    desc: Publish a single CUE module to local registry (PATH=<dir> [VERSION=vX.Y.Z])
    summary: |
      Publish a single discovered module by relative path.

      Usage:
        task cue:publish PATH=modules/opm
        task cue:publish PATH=modules/opm_platform VERSION=v1.0.1
    vars:
      PATH: '{{.PATH | default ""}}'
      VERSION: '{{.VERSION | default ""}}'
    env:
      CUE_REGISTRY: "{{.CUE_LOCAL_REGISTRY}}"
    preconditions:
      - sh: '[ -n "{{.PATH}}" ]'
        msg: "PATH is required. Usage: task cue:publish PATH=<module-dir>"
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required"
    cmds:
      - |
        set -euo pipefail
        DIR="{{.PATH}}"
        if [ ! -f "${DIR}/cue.mod/module.cue" ]; then
          echo "Module not found: ${DIR}" >&2
          exit 1
        fi
        if [ -n "{{.VERSION}}" ]; then
          VERSION="{{.VERSION}}"
        else
          VERSION=$(yq ".\"${DIR}\".version // \"\"" "{{.CUE_VERSION_FILE}}")
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            VERSION="{{.CUE_DEFAULT_VERSION}}"
          fi
        fi
        echo "Publishing ${DIR}@${VERSION} to {{.CUE_LOCAL_REGISTRY}}..."
        (cd "${DIR}" && cue mod publish "${VERSION}")
        echo "Published ${DIR}@${VERSION}"

  cue:publish:smart:
    desc: Detect changes per CUE module, bump versions, publish in dependency order
    summary: |
      Auto-discovers CUE modules via CUE_MODULE_GLOBS in Taskfile.yml.

      For each module, computes a SHA-256 checksum of .cue files (excluding
      cue.mod/), compares with the stored checksum in cue-versions.yml, and
      publishes only modules that changed.

      Module dependencies declared in cue.mod/module.cue are used to topo-
      sort the publish order — a module that depends on another discovered
      module publishes after it.

      A patch bump is applied by default. New modules (no entry in
      cue-versions.yml) publish at v1.0.0.

      Usage:
        task cue:publish:smart                # detect, bump patch, publish
        task cue:publish:smart DRY_RUN=true   # preview without executing
        task cue:publish:smart TYPE=minor     # minor bump
        task cue:publish:smart TYPE=major     # major bump
    vars:
      DRY_RUN: '{{.DRY_RUN | default "false"}}'
      TYPE: '{{.TYPE | default "patch"}}'
    env:
      CUE_REGISTRY: "{{.CUE_LOCAL_REGISTRY}}"
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required"
      - sh: command -v jq >/dev/null 2>&1
        msg: "jq is required"
      - sh: command -v cue >/dev/null 2>&1
        msg: "cue is required"
    cmds:
      - |
        #!/usr/bin/env bash
        set -euo pipefail

        VERSION_FILE="{{.CUE_VERSION_FILE}}"
        DRY_RUN="{{.DRY_RUN}}"
        BUMP_TYPE="{{.TYPE}}"
        DEFAULT_VERSION="{{.CUE_DEFAULT_VERSION}}"

        BOLD='\033[1m'; DIM='\033[2m'; RED='\033[0;31m'; GREEN='\033[0;32m'; YELLOW='\033[0;33m'; RESET='\033[0m'

        if [ ! -f "$VERSION_FILE" ]; then
          echo "{}" > "$VERSION_FILE"
        fi

        compute_checksum() {
          local dir="$1"
          find "$dir" -name '*.cue' -not -path '*/cue.mod/*' | sort | xargs sha256sum | sha256sum | awk '{print $1}'
        }

        bump_version() {
          local ver="${1#v}"
          IFS='.' read -r major minor patch <<< "$ver"
          case "$2" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          echo "v${major}.${minor}.${patch}"
        }

        # ── Discover modules ──────────────────────────────────────────
        echo -e "${BOLD}Discovering CUE modules...${RESET}"

        MOD_DIRS=()
        MOD_PATHS=()
        while IFS= read -r glob; do
          [ -z "$glob" ] && continue
          for dir in $glob; do
            [ -f "${dir}/cue.mod/module.cue" ] || continue
            path=$(cue export "${dir}/cue.mod/module.cue" --out json | jq -r '.module')
            MOD_DIRS+=("$dir")
            MOD_PATHS+=("$path")
            echo -e "  ${DIM}${dir} → ${path}${RESET}"
          done
        done <<< '{{.CUE_MODULE_GLOBS}}'

        if [ ${#MOD_DIRS[@]} -eq 0 ]; then
          echo -e "${YELLOW}No modules discovered.${RESET}"
          exit 0
        fi

        # ── Build dep graph (intra-discovery only) ────────────────────
        DEPS_OF=()
        for i in "${!MOD_DIRS[@]}"; do
          dir="${MOD_DIRS[$i]}"
          local_deps=""
          while IFS= read -r dep; do
            [ -z "$dep" ] && continue
            for j in "${!MOD_PATHS[@]}"; do
              if [ "${MOD_PATHS[$j]}" = "$dep" ]; then
                local_deps="${local_deps} ${j}"
              fi
            done
          done < <(cue export "${dir}/cue.mod/module.cue" --out json | jq -r '.deps // {} | keys[]')
          DEPS_OF+=("$local_deps")
        done

        # ── Topological sort ──────────────────────────────────────────
        ORDER=()
        VISITED=()
        VISITING=()
        for i in "${!MOD_DIRS[@]}"; do
          VISITED[$i]=0
          VISITING[$i]=0
        done

        visit() {
          local idx="$1"
          if [ "${VISITING[$idx]}" -eq 1 ]; then
            echo -e "${RED}Dependency cycle involving ${MOD_DIRS[$idx]}${RESET}" >&2
            exit 1
          fi
          if [ "${VISITED[$idx]}" -eq 1 ]; then
            return
          fi
          VISITING[$idx]=1
          for d in ${DEPS_OF[$idx]}; do
            visit "$d"
          done
          VISITING[$idx]=0
          VISITED[$idx]=1
          ORDER+=("$idx")
        }

        for i in "${!MOD_DIRS[@]}"; do
          visit "$i"
        done

        # ── Phase 1: Detect changes ──────────────────────────────────
        echo ""
        echo -e "${BOLD}Phase 1: Detecting changes...${RESET}"

        CHANGED_IDX=()
        CHANGED_NEW_VER=()

        for idx in "${ORDER[@]}"; do
          dir="${MOD_DIRS[$idx]}"
          stored=$(yq ".\"${dir}\".checksum // \"\"" "$VERSION_FILE")
          current=$(compute_checksum "$dir")
          version=$(yq ".\"${dir}\".version // \"\"" "$VERSION_FILE")

          if [ -z "$version" ] || [ "$version" = "null" ]; then
            new_version="$DEFAULT_VERSION"
            echo -e "  ${YELLOW}${dir}${RESET}: new module → ${GREEN}${new_version}${RESET}"
            CHANGED_IDX+=("$idx")
            CHANGED_NEW_VER+=("$new_version")
          elif [ -z "$stored" ] || [ "$stored" = "null" ]; then
            new_version=$(bump_version "$version" "$BUMP_TYPE")
            echo -e "  ${YELLOW}${dir}${RESET}: changed (no stored checksum) → ${version} → ${GREEN}${new_version}${RESET}"
            CHANGED_IDX+=("$idx")
            CHANGED_NEW_VER+=("$new_version")
          elif [ "$stored" != "$current" ]; then
            new_version=$(bump_version "$version" "$BUMP_TYPE")
            echo -e "  ${YELLOW}${dir}${RESET}: changed → ${version} → ${GREEN}${new_version}${RESET}"
            CHANGED_IDX+=("$idx")
            CHANGED_NEW_VER+=("$new_version")
          else
            echo -e "  ${dir}: unchanged"
          fi
        done

        if [ ${#CHANGED_IDX[@]} -eq 0 ]; then
          echo ""
          echo -e "${GREEN}No changes detected. Nothing to publish.${RESET}"
          exit 0
        fi

        if [ "$DRY_RUN" = "true" ]; then
          echo ""
          echo -e "${BOLD}Dry run — no changes made.${RESET}"
          exit 0
        fi

        # ── Phase 2: Publish in dep order ────────────────────────────
        echo ""
        echo -e "${BOLD}Phase 2: Publishing...${RESET}"

        for k in "${!CHANGED_IDX[@]}"; do
          idx="${CHANGED_IDX[$k]}"
          dir="${MOD_DIRS[$idx]}"
          new_version="${CHANGED_NEW_VER[$k]}"

          echo ""
          echo -e "${BOLD}${GREEN}[${dir}]${RESET} → ${GREEN}${new_version}${RESET}"

          yq -i ".\"${dir}\".version = \"${new_version}\"" "$VERSION_FILE"

          echo "  Tidying..."
          (cd "$dir" && cue mod tidy)

          echo "  Publishing ${dir}@${new_version}..."
          if ! (cd "$dir" && cue mod publish "${new_version}"); then
            echo -e "  ${RED}Failed to publish ${dir}${RESET}" >&2
            exit 1
          fi

          new_checksum=$(compute_checksum "$dir")
          yq -i ".\"${dir}\".checksum = \"${new_checksum}\"" "$VERSION_FILE"
          echo -e "  Checksum: ${DIM}${new_checksum:0:12}...${RESET}"
        done

        echo ""
        echo -e "${BOLD}${GREEN}Done.${RESET} Published ${#CHANGED_IDX[@]} module(s)."
      - task: cue:tidy
      - task: cue:fmt
      - task: cue:vet

  cue:publish:catalog:
    desc: Publish the opm catalog (opmodel.dev/catalogs/opm) at VERSION via temp-build stamping
    summary: |
      Publish the OPM core catalog with publish-time version stamping.

      The committed source tree resolves identity.Version to the "0.0.0-dev"
      dev sentinel. This task copies the catalog into a transient build dir
      (source tree untouched, cue.mod/{pkg,gen,usr} excluded), writes
      identity/version_override.cue pinning the concrete bare SemVer, vets
      from the build dir, then runs `cue mod publish vX.Y.Z`.

      VERSION accepts bare (0.1.0) or v-prefixed (v0.1.0) input. The OCI tag
      is always v-prefixed; the stamped metadata.version / FQN stays bare,
      per the version-layering decision (D-D). Publishing is refused when the
      resolved Version is the 0.0.0-dev sentinel (D8/D9 guard).

      CUE_REGISTRY is inherited from the environment when set (CI sets the
      GHCR mapping); otherwise it defaults to the local registry.

      Usage:
        task cue:publish:catalog VERSION=0.1.0
    vars:
      VERSION: '{{.VERSION | default ""}}'
      CATALOG_DIR: modules/opm
      BUILD_DIR: .build/catalog
    preconditions:
      - sh: command -v rsync >/dev/null 2>&1
        msg: "rsync is required"
      - sh: command -v cue >/dev/null 2>&1
        msg: "cue is required"
    cmds:
      - |
        set -euo pipefail

        # Inherit CUE_REGISTRY from the environment (CI sets GHCR); default to
        # the local registry for laptop publishing.
        : "${CUE_REGISTRY:={{.CUE_LOCAL_REGISTRY}}}"
        export CUE_REGISTRY

        SRC="{{.CATALOG_DIR}}"
        BUILD="{{.BUILD_DIR}}"
        DEV_SENTINEL="0.0.0-dev"

        # Normalize: strip a leading v for the bare SemVer; the OCI tag re-adds it.
        BARE="$(printf '%s' '{{.VERSION}}' | sed 's/^v//')"

        # Stage a clean build tree (source untouched).
        rm -rf "$BUILD"
        mkdir -p "$BUILD"
        rsync -a \
          --exclude='cue.mod/pkg' \
          --exclude='cue.mod/gen' \
          --exclude='cue.mod/usr' \
          "$SRC/" "$BUILD/"

        # Stamp the concrete version into the build tree only (never the source
        # tree). With no real VERSION the stamp is skipped and the resolved
        # version stays at the dev sentinel, tripping the guard below.
        if [ -n "$BARE" ] && [ "$BARE" != "$DEV_SENTINEL" ]; then
          printf 'package identity\n\nVersion: "%s"\n' "$BARE" > "$BUILD/identity/version_override.cue"
        fi

        # Resolve the effective version from the staged identity package.
        RESOLVED="$(cd "$BUILD" && cue export ./identity -e Version 2>/dev/null | tr -d '"')"

        # Guard (D8/D9): the dev sentinel is never publishable.
        if [ -z "$RESOLVED" ] || [ "$RESOLVED" = "$DEV_SENTINEL" ]; then
          echo "::error:: refusing to publish catalog at version '${RESOLVED:-<unset>}' — supply VERSION=X.Y.Z ('$DEV_SENTINEL' is the dev sentinel and is not publishable)" >&2
          exit 1
        fi

        echo "Validating catalog at ${RESOLVED}..."
        (cd "$BUILD" && cue vet ./...)

        echo "Publishing opmodel.dev/catalogs/opm@${RESOLVED} (OCI tag v${RESOLVED}) to ${CUE_REGISTRY}..."
        (cd "$BUILD" && cue mod publish "v${RESOLVED}")
        echo "Published opmodel.dev/catalogs/opm@${RESOLVED}"
