version: "3"

silent: true

tasks:
  # ============================================================================
  # Index Generation
  # ============================================================================

  generate:index:
    desc: Generate INDEX.md for all CUE API modules
    cmds:
      - |
        set -euo pipefail
        FOUND=0
        while IFS= read -r module_cue; do
          module_dir="$(dirname "$(dirname "$module_cue")")"
          echo "Generating $module_dir/INDEX.md"
          bash .tasks/generate-index.sh "$module_dir" > "$module_dir/INDEX.md"
          FOUND=$((FOUND + 1))
        done < <(find . -type f -path '*/cue.mod/module.cue' | sort)

        if [[ "$FOUND" -eq 0 ]]; then
          echo "No CUE modules found (looked for */cue.mod/module.cue)" >&2
          exit 1
        fi

  generate:index:check:
    desc: Verify INDEX.md files match generated output (exits non-zero if any differ)
    cmds:
      - |
        set -euo pipefail
        TMPDIR_CHECK=$(mktemp -d)
        trap 'rm -rf "$TMPDIR_CHECK"' EXIT

        check_module() {
          local dir="$1"
          local expected="$dir/INDEX.md"
          local generated="$TMPDIR_CHECK/$(echo "$dir" | tr '/' '_').md"

          bash .tasks/generate-index.sh "$dir" > "$generated"

          if [[ ! -f "$expected" ]]; then
            echo "FAIL: $expected does not exist — run 'task generate:index' to create it"
            return 1
          fi

          if ! diff -q "$expected" "$generated" > /dev/null 2>&1; then
            echo "FAIL: $expected is out of date"
            diff "$expected" "$generated" || true
            return 1
          fi

          echo "OK: $expected"
        }

        FAILED=0
        FOUND=0
        while IFS= read -r module_cue; do
          module_dir="$(dirname "$(dirname "$module_cue")")"
          check_module "$module_dir" || FAILED=1
          FOUND=$((FOUND + 1))
        done < <(find . -type f -path '*/cue.mod/module.cue' | sort)

        if [[ "$FOUND" -eq 0 ]]; then
          echo "No CUE modules found (looked for */cue.mod/module.cue)" >&2
          exit 1
        fi

        if [[ "$FAILED" -eq 1 ]]; then
          echo ""
          echo "Run 'task generate:index' to regenerate INDEX.md files."
          exit 1
        fi

        echo ""
        echo "All INDEX.md files are up to date."
